<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG PRESENSI MAHASISWA | FH UII</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            width: 1000px;
            height: 600px;
            background-color: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        /* Sisi Kiri - Banner Navigasi */
        .sidebar {
            width: 30%;
            background-color: #0d2c54; /* Navy UII */
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: white;
        }

        /* Perbaikan Posisi Logo & Tulisan agar pas ke Tengah */
        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;  /* Membuat isi konten rata tengah secara horizontal */
            text-align: center;   /* Membuat teks membungkus rata tengah */
            width: 100%;
        }

        .logo-section img {
            max-width: 140px;     /* Ukuran disamakan dengan absensi.html */
            height: auto;
            margin-bottom: 20px;
        }

        .logo-section h3 {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.8px;
            color: #ffffff;
            line-height: 1.5;
            text-transform: uppercase;
        }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .nav-btn {
            background-color: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 20px;
            border-radius: 10px;
            text-align: left;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 0.5px;
        }

        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }

        /* Sisi Kanan - Tabel Log */
        .log-section {
            width: 70%;
            background-color: #113f67; /* Slate Blue Gelap */
            padding: 40px;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .log-section h2 {
            font-size: 24px;
            border-left: 4px solid #f39c12; /* Aksen Gold */
            padding-left: 10px;
        }

        .btn-clear {
            background-color: #b91c1c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-clear:hover { background-color: #991b1b; }

        .table-container {
            width: 100%;
            overflow-y: auto;
            background-color: #0b253a;
            border-radius: 10px;
            border: 1px solid #1e293b;
            flex-grow: 1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: #0f3456;
            color: #f39c12; /* Judul Kolom Emas */
            padding: 15px;
            font-weight: 600;
            position: sticky;
            top: 0;
            border-bottom: 2px solid #1e293b;
        }

        td {
            padding: 14px 15px;
            border-bottom: 1px solid #1e293b;
            color: #e2e8f0;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Badge Status */
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-hadir { background-color: #065f46; color: #34d399; }
        .badge-izin { background-color: #854d0e; color: #fde047; }
        .badge-sakit { background-color: #1e40af; color: #93c5fd; }
        .badge-alpha { background-color: #991b1b; color: #fca5a5; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #64748b;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="logo-section">
            <img src="logo.png.png" alt="Logo UII" onerror="this.src='https://via.placeholder.com/150x50?text=FACULTY+OF+LAW'">
            <h3>Universitas Islam Indonesia</h3>
        </div>
        
        <div class="nav-buttons">
            <a href="index.html" class="nav-btn">BERANDA <span>→</span></a>
            <a href="absensi.html" class="nav-btn">FORM ABSENSI <span>→</span></a>
        </div>
        
        <div style="font-size: 11px; color: #94a3b8; text-align: center; width: 100%;">© 2026 FH UII Gatekeeper</div>
    </div>

    <div class="log-section">
        <div class="header-box">
            <h2>Log Riwayat Presensi</h2>
            <button class="btn-clear" onclick="hapusSemuaLog()">Reset Data</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Waktu</th>
                        <th>NIM</th>
                        <th>Nama</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="logTableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function muatLog() {
        const tableBody = document.getElementById('logTableBody');
        const logPresensi = JSON.parse(localStorage.getItem('logPresensi')) || [];

        if (logPresensi.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="5" class="empty-state">Belum ada riwayat presensi hari ini.</td></tr>`;
            return;
        }

        let htmlRows = "";
        logPresensi.forEach(item => {
            let badgeClass = "badge-hadir";
            if (item.status === "Izin") badgeClass = "badge-izin";
            if (item.status === "Sakit") badgeClass = "badge-sakit";
            if (item.status === "Alpha") badgeClass = "badge-alpha";

            htmlRows += `
                <tr>
                    <td>${item.tanggal}</td>
                    <td>${item.jam}</td>
                    <td>${item.nim}</td>
                    <td>${item.nama.toUpperCase()}</td>
                    <td><span class="badge ${badgeClass}">${item.status}</span></td>
                </tr>
            `;
        });

        tableBody.innerHTML = htmlRows;
    }

    function hapusSemuaLog() {
        if(confirm("Apakah Anda yakin ingin menghapus semua riwayat presensi?")) {
            localStorage.removeItem('logPresensi');
            muatLog();
        }
    }

    window.onload = muatLog;
</script>
</body>
</html>
