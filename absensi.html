<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABSENSI MAHASISWA | FH UII</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            width: 900px;
            height: 550px;
            background-color: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Sisi Kiri - Banner Navigasi */
        .sidebar {
            width: 40%;
            background-color: #0d2c54; /* Navy UII */
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: white;
        }

        .logo-section img {
            max-width: 180px;
            margin-bottom: 10px;
        }

        .logo-section h3 {
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 1px;
            color: #d1d5db;
        }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .nav-btn {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            text-align: left;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* Sisi Kanan - Form Absen */
        .form-section {
            width: 60%;
            background-color: #113f67; /* Slate Blue Gelap */
            padding: 40px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-section h2 {
            font-size: 24px;
            margin-bottom: 5px;
            border-left: 4px solid #f39c12; /* Aksen Gold */
            padding-left: 10px;
        }

        .form-section p {
            font-size: 12px;
            color: #cbd5e1;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 8px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background-color: #0b253a;
            border: 1px solid #1e293b;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #f39c12;
        }

        /* Status Buttons (Hadir, Izin, Sakit, Alpha) */
        .status-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .status-btn {
            background-color: #0b253a;
            border: 1px solid #1e293b;
            color: #94a3b8;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }

        .status-btn:hover {
            border-color: #f39c12;
            color: white;
        }

        /* State ketika tombol opsi status dipilih */
        .status-btn.active {
            background-color: #047857; /* Hijau Sukses Pas Diklik */
            color: white;
            border-color: #047857;
        }

        .btn-submit {
            background-color: #f39c12; /* Gold UII */
            color: #0d2c54;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            background-color: #e67e22;
        }

        /* Notifikasi sukses/gagal singkat */
        .alert {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }
        .alert-success { background-color: #047857; color: white; }
        .alert-danger { background-color: #b91c1c; color: white; }
    </style>
</head>
<body>

<div class="container">
    <!-- Kiri -->
    <div class="sidebar">
        <div class="logo-section">
            <!-- Sesuaikan dengan logo.png.png Anda -->
            <img src="logo.png.png" alt="Logo UII" onerror="this.src='https://via.placeholder.com/150x50?text=FACULTY+OF+LAW'">
            <h3>UNIVERSITAS ISLAM INDONESIA</h3>
        </div>
        
        <div class="nav-buttons">
            <a href="index.html" class="nav-btn">BERANDA <span>→</span></a>
            <a href="log.html" class="nav-btn">LOG PRESENSI <span>→</span></a>
        </div>
        
        <div style="font-size: 11px; color: #94a3b8;">© 2026 FH UII Gatekeeper</div>
    </div>

    <!-- Kanan -->
    <div class="form-section">
        <h2>Input Kehadiran</h2>
        <p>Silakan isi data kehadiran Anda dengan benar.</p>

        <div id="alertBox" class="alert"></div>

        <div class="input-group">
            <label>Nomor Identitas Mahasiswa (NIM)</label>
            <input type="text" id="nimInput" placeholder="Masukkan NIM">
        </div>

        <div class="input-group">
            <label>Nama Mahasiswa</label>
            <input type="text" id="namaInput" placeholder="Nama Lengkap">
        </div>

        <div class="input-group">
            <label>Keterangan</label>
            <div class="status-container">
                <button type="button" class="status-btn" onclick="selectStatus(this, 'Hadir')">Hadir</button>
                <button type="button" class="status-btn" onclick="selectStatus(this, 'Izin')">Izin</button>
                <button type="button" class="status-btn" onclick="selectStatus(this, 'Sakit')">Sakit</button>
                <button type="button" class="status-btn" onclick="selectStatus(this, 'Alpha')">Alpha</button>
            </div>
        </div>

        <button type="button" class="btn-submit" onclick="simpanAbsen()">KIRIM</button>
    </div>
</div>

<script>
    let selectedStatus = "";

    // Fungsi memilih opsi kehadiran
    function selectStatus(btn, status) {
        const buttons = document.querySelectorAll('.status-btn');
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedStatus = status;
    }

    // Fungsi menyimpan absen simulasi (ke LocalStorage)
    function simpanAbsen() {
        const nim = document.getElementById('nimInput').value.trim();
        const nama = document.getElementById('namaInput').value.trim();
        const alertBox = document.getElementById('alertBox');

        if (!nim || !nama || !selectedStatus) {
            alertBox.className = "alert alert-danger";
            alertBox.innerText = "Gagal: Harap isi semua kolom dan pilih keterangan!";
            alertBox.style.display = "block";
            return;
        }

        // Ambil waktu asli saat ini
        const sekarang = new Date();
        const tanggal = sekarang.toISOString().split('T')[0];
        const jam = sekarang.toTimeString().split(' ')[0].substring(0, 5) + " WIB";

        // Struktur data baru
        const dataBaru = { tanggal, jam, nim, nama, status: selectedStatus };

        // Tarik data lama dari LocalStorage jika ada
        let logPresensi = JSON.parse(localStorage.getItem('logPresensi')) || [];
        logPresensi.unshift(dataBaru); // Masukkan di paling atas baris

        // Simpan kembali
        localStorage.setItem('logPresensi', JSON.stringify(logPresensi));

        // Tampilkan pesan sukses
        alertBox.className = "alert alert-success";
        alertBox.innerText = `Sukses: Absensi ${nama.toUpperCase()} berhasil dikirim!`;
        alertBox.style.display = "block";

        // Reset form input
        document.getElementById('nimInput').value = "";
        document.getElementById('namaInput').value = "";
        document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
        selectedStatus = "";
    }
</script>
</body>
</html>
