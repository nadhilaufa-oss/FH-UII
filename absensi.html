<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/img" href="logo.png.png"
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABSENSI MAHASISWA | FH UII</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            width: 950px;
            height: 580px;
            background-color: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        /* Sisi Kiri - Banner Navigasi */
        .sidebar {
            width: 40%;
            background-color: #0d2c54; /* Navy UII */
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: white;
        }

        /* Perbaikan Posisi Logo & Tulisan agar pas ke Tengah */
        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;  /* Membuat isi konten rata tengah secara horizontal */
            text-align: center;   /* Membuat teks membungkus rata tengah */
            width: 100%;
        }

        .logo-section img {
            max-width: 140px;     /* Ukuran logo disesuaikan proporsinya */
            height: auto;
            margin-bottom: 20px;
        }

        .logo-section h3 {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.8px;
            color: #ffffff;
            line-height: 1.5;
            text-transform: uppercase;
        }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .nav-btn {
            background-color: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 20px;
            border-radius: 10px;
            text-align: left;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 0.5px;
        }

        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }

        /* Sisi Kanan - Form Absen */
        .form-section {
            width: 60%;
            background-color: #113f67; /* Slate Blue Gelap */
            padding: 45px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-section h2 {
            font-size: 26px;
            margin-bottom: 6px;
            border-left: 4px solid #f39c12; /* Aksen Gold */
            padding-left: 12px;
        }

        .form-section p {
            font-size: 13px;
            color: #cbd5e1;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            margin-bottom: 8px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px;
            background-color: #0b253a;
            border: 1px solid #1e293b;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #f39c12;
        }

        /* Status Buttons (Hadir, Izin, Sakit, Alpha) */
        .status-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 10px;
        }

        .status-btn {
            background-color: #0b253a;
            border: 1px solid #1e293b;
            color: #94a3b8;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.2s;
        }

        .status-btn:hover {
            border-color: #f39c12;
            color: white;
        }

        .status-btn.active {
            background-color: #1e3a5f; /* Tetap bertema gelap saat dipilih */
            color: white;
            border-color: #f39c12;
            box-shadow: inset 0 0 5px rgba(243, 156, 18, 0.3);
        }

        .btn-submit {
            background-color: #f39c12; /* Gold UII */
            color: #0d2c54;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 15px;
        }

        .btn-submit:hover {
            background-color: #e67e22;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            font-weight: 500;
        }
        .alert-danger { background-color: #b91c1c; color: white; border: 1px solid #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="logo-section">
            <img src="logo.png.png" alt="Logo UII" onerror="this.src='https://via.placeholder.com/150x50?text=FACULTY+OF+LAW'">
            <h3>Universitas Islam Indonesia</h3>
        </div>
        
        <div class="nav-buttons">
            <a href="index.html" class="nav-btn">BERANDA <span>→</span></a>
            <a href="log.html" class="nav-btn">LOG PRESENSI <span>→</span></a>
        </div>
        
        <div style="font-size: 11px; color: #94a3b8; text-align: center; width: 100%;">© 2026 FH UII Gatekeeper</div>
    </div>

    <div class="form-section">
        <h2>Input Kehadiran</h2>
        <p>Silakan isi data kehadiran Anda dengan benar.</p>

        <div id="alertBox" class="alert alert-danger"></div>

        <div class="input-group">
            <label>Nomor Identitas Mahasiswa (NIM)</label>
            <input type="text" id="nimInput" placeholder="Masukkan NIM">
        </div>

        <div class="input-group">
            <label>Nama Mahasiswa</label>
            <input type="text" id="namaInput" placeholder="Nama Lengkap">
        </div>

        <div class="input-group">
            <label>Keterangan</label>
            <div class="status-container">
                <button type="button" class="status-btn" onclick="selectStatus(this, 'Hadir')">Hadir</button>
                <button type="button" class="status-btn" onclick="selectStatus(this, 'Izin')">Izin</button>
                <button type="button" class="status-btn" onclick="selectStatus(this, 'Sakit')">Sakit</button>
                <button type="button" class="status-btn" onclick="selectStatus(this, 'Alpha')">Alpha</button>
            </div>
        </div>

        <button type="button" class="btn-submit" onclick="simpanAbsen()">KIRIM</button>
    </div>
</div>

<script>
    let selectedStatus = "";

    function selectStatus(btn, status) {
        const buttons = document.querySelectorAll('.status-btn');
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedStatus = status;
    }

    function simpanAbsen() {
        const nim = document.getElementById('nimInput').value.trim();
        const nama = document.getElementById('namaInput').value.trim();
        const alertBox = document.getElementById('alertBox');

        // Validasi jika ada form yang kosong
        if (!nim || !nama || !selectedStatus) {
            alertBox.innerText = "Gagal: Harap isi semua kolom dan pilih keterangan!";
            alertBox.style.display = "block";
            return;
        }

        // Ambil waktu asli sistem saat ini
        const sekarang = new Date();
        const tanggal = sekarang.toISOString().split('T')[0];
        const jam = sekarang.toTimeString().split(' ')[0].substring(0, 5) + " WIB";

        const dataBaru = { tanggal, jam, nim, nama, status: selectedStatus };

        // Tarik data lama dari LocalStorage
        let logPresensi = JSON.parse(localStorage.getItem('logPresensi')) || [];
        logPresensi.unshift(dataBaru); // Tambahkan data baru di urutan teratas

        // Simpan kembali data ke memori local browser
        localStorage.setItem('logPresensi', JSON.stringify(logPresensi));

        // Setelah berhasil, langsung arahkan otomatis ke halaman log.html
        window.location.href = "log.html";
    }
</script>
</body>
</html>
